name: Release Firmware

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional gateway release version override. Leave empty to auto-increment."
        required: false
        default: ""
        type: string
      target_branch:
        description: "Branch to release from"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      RELEASE_ENV: WirelessStickV3-ESP32S3

    steps:
      - name: Check out RaceLink_Gateway repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve gateway release version
        id: release_version
        run: |
          version="$(python scripts/bump_release_version.py --version "${{ inputs.version }}")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Validate release version and tag
        env:
          EXPECTED_VERSION: ${{ steps.release_version.outputs.version }}
          EXPECTED_TAG: ${{ steps.release_version.outputs.tag }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("version.json").read_text(encoding="utf-8"))
          version = str(payload["version"])
          expected_version = os.environ["EXPECTED_VERSION"]
          expected_tag = os.environ["EXPECTED_TAG"]
          derived_tag = f"v{version}"

          if version != expected_version:
              raise SystemExit(f"Release version mismatch: {version} != {expected_version}")
          if derived_tag != expected_tag:
              raise SystemExit(f"Release tag mismatch: {derived_tag} != {expected_tag}")
          PY

      - name: Fail if tag or release already exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git ls-remote --tags origin "${{ steps.release_version.outputs.tag }}" | grep -q "${{ steps.release_version.outputs.tag }}"; then
            echo "Tag ${{ steps.release_version.outputs.tag }} already exists on origin"
            exit 1
          fi
          if gh release view "${{ steps.release_version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.release_version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Run static release tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Build gateway firmware
        run: python -m platformio run -e "${{ env.RELEASE_ENV }}"

      - name: Stage release artifacts
        id: stage_artifacts
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
          RELEASE_ENV: ${{ env.RELEASE_ENV }}
        run: |
          python - <<'PY'
          import hashlib
          import os
          import shutil
          from pathlib import Path

          release_version = os.environ["RELEASE_VERSION"]
          release_env = os.environ["RELEASE_ENV"]

          source_firmware = Path(".pio") / "build" / release_env / "firmware.bin"
          if not source_firmware.is_file():
              raise SystemExit(f"Expected firmware artifact not found: {source_firmware}")

          dist_dir = Path("dist")
          dist_dir.mkdir(parents=True, exist_ok=True)

          firmware_name = f"RaceLink_Gateway-{release_version}-{release_env}.bin"
          firmware_path = dist_dir / firmware_name
          shutil.copy2(source_firmware, firmware_path)

          digest = hashlib.sha256(firmware_path.read_bytes()).hexdigest()
          checksum_name = f"RaceLink_Gateway-{release_version}-sha256.txt"
          checksum_path = dist_dir / checksum_name
          checksum_path.write_text(f"{digest}  {firmware_name}\n", encoding="utf-8")

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              handle.write(f"firmware_name={firmware_name}\n")
              handle.write(f"checksum_name={checksum_name}\n")
          PY

      - name: Commit release metadata
        run: |
          git add version.json
          if git diff --cached --quiet; then
            echo "Release metadata did not change"
          else
            git commit -m "Release v${{ steps.release_version.outputs.version }}"
          fi

      - name: Create and push release tag
        run: |
          git tag "${{ steps.release_version.outputs.tag }}"
          git push origin "HEAD:${{ inputs.target_branch }}" --follow-tags

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: racelink_gateway_release
          path: |
            dist/${{ steps.stage_artifacts.outputs.firmware_name }}
            dist/${{ steps.stage_artifacts.outputs.checksum_name }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_version.outputs.tag }}
          target_commitish: ${{ inputs.target_branch }}
          generate_release_notes: true
          files: |
            dist/${{ steps.stage_artifacts.outputs.firmware_name }}
            dist/${{ steps.stage_artifacts.outputs.checksum_name }}

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## Release Summary"
            echo
            echo "- Gateway version: \`${{ steps.release_version.outputs.version }}\`"
            echo "- Gateway tag: \`${{ steps.release_version.outputs.tag }}\`"
            echo "- PlatformIO environment: \`${{ env.RELEASE_ENV }}\`"
            echo "- Firmware artifact: \`${{ steps.stage_artifacts.outputs.firmware_name }}\`"
            echo "- SHA256 artifact: \`${{ steps.stage_artifacts.outputs.checksum_name }}\`"
            echo "- Trigger: \`workflow_dispatch\`"
          } >> "$GITHUB_STEP_SUMMARY"
